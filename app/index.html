<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Medical English · PocketBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#FFFCF5;-webkit-text-size-adjust:100%;min-height:100vh}
    body,button{font-family:'Nunito',system-ui,sans-serif}
    h1,h2,.hf{font-family:'Baloo 2',system-ui,sans-serif}
    @keyframes popIn{0%{transform:scale(.85);opacity:0}65%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
    @keyframes slideU{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes wobble{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
    .pop{animation:popIn .38s cubic-bezier(.34,1.56,.64,1) both}
    .su{animation:slideU .35s ease both}
    .wobble{animation:wobble 2.5s ease-in-out infinite}
    .mbtn{
      width:100%;padding:13px 16px;border:2.5px solid #2A2A2A;border-radius:14px;
      font-family:'Nunito',system-ui,sans-serif;font-size:15px;font-weight:900;
      cursor:pointer;box-shadow:4px 4px 0 #2A2A2A;
      -webkit-appearance:none;appearance:none;display:block;text-align:center;
      transition:transform .1s,box-shadow .1s;
    }
    .mbtn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #2A2A2A}
    .obtn{
      width:100%;padding:11px;border:2px solid #BBB;border-radius:14px;
      font-family:'Nunito',system-ui,sans-serif;font-size:14px;font-weight:700;
      cursor:pointer;background:transparent;color:#888;
      box-shadow:3px 3px 0 #DDD;margin-top:9px;
      -webkit-appearance:none;appearance:none;
      transition:transform .1s,box-shadow .1s;
    }
    .obtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #DDD}
    .opt{
      width:100%;text-align:left;padding:12px 14px;
      border:2.5px solid #2A2A2A;border-radius:13px;background:#fff;cursor:pointer;
      font-family:'Nunito',system-ui,sans-serif;font-size:14px;font-weight:700;color:#2A2A2A;
      box-shadow:3px 3px 0 #2A2A2A;display:flex;align-items:center;gap:10px;
      margin-bottom:9px;line-height:1.5;-webkit-appearance:none;appearance:none;
      transition:transform .1s,box-shadow .1s;
    }
    .opt:not(.locked):active{transform:translate(2px,2px);box-shadow:1px 1px 0 #2A2A2A}
    .opt.ok{border-color:#1CB897!important;background:#E4FAF4!important;box-shadow:3px 3px 0 #1CB897!important;color:#0A7A60!important}
    .opt.no{border-color:#E84D6A!important;background:#FEF0F4!important;box-shadow:3px 3px 0 #E84D6A!important;color:#A82040!important}
    .opt.locked{cursor:default}
    .opt.dim{opacity:.45}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#DDD;border-radius:4px}
    #app{min-height:100vh;background:#FFFCF5}

    /* ── PICKER ── */
    .pk-wrap{max-width:460px;margin:0 auto;padding:28px 16px}
    .pk-header{text-align:center;margin-bottom:28px}
    .pk-logo{width:72px;height:72px;border-radius:50%;border:3px solid #2A2A2A;background:#fff;
      box-shadow:5px 5px 0 #2A2A2A;display:flex;align-items:center;justify-content:center;
      font-size:32px;margin:0 auto 14px}
    .pk-card{
      display:flex;align-items:center;gap:14px;
      background:#fff;border:2.5px solid #2A2A2A;border-radius:16px;
      padding:14px 16px;margin-bottom:12px;cursor:pointer;
      box-shadow:4px 4px 0 #2A2A2A;text-align:left;width:100%;
      -webkit-appearance:none;appearance:none;font-family:'Nunito',system-ui,sans-serif;
      transition:transform .1s,box-shadow .1s;
    }
    .pk-card:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #2A2A2A}
    .pk-emoji{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;
      justify-content:center;font-size:26px;flex-shrink:0;border:2px solid}
    .pk-meta{flex:1;min-width:0}
    .pk-title{font-size:14px;font-weight:900;color:#2A2A2A;line-height:1.35;margin-bottom:3px}
    .pk-vi{font-size:11px;color:#AAA;font-style:italic;margin-bottom:6px}
    .pk-badges{display:flex;gap:5px;flex-wrap:wrap}
    .pk-pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;border:1.5px solid;white-space:nowrap}
    .pk-arrow{font-size:20px;color:#2A2A2A;flex-shrink:0;opacity:.4}
    .pk-coming{opacity:.45;cursor:default;border-style:dashed}
    .pk-coming:active{transform:none;box-shadow:4px 4px 0 #2A2A2A}
  </style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  /* ── Tier colour tokens ── */
  var TIERS = {
    free:    { c:'#1CB897', bg:'#E4FAF4', sh:'#0D8A6D' },
    premium: { c:'#7B5EA7', bg:'#F0EAFF', sh:'#5C4080' },
    soon:    { c:'#AAA',    bg:'#F5F5F5', sh:'#CCC'    }
  };
  var STAGE_COLORS = {
    '1A':'#E84D6A','1B':'#D48A00','2A':'#1CB897','2B':'#4A8FE8',
    '3A':'#7B5EA7','3B':'#E84D6A','4A':'#D48A00','4B':'#1CB897',
    '5A':'#4A8FE8','5B':'#7B5EA7'
  };

  function boot(lesson) {
    window.LESSON = lesson;
    var s = document.createElement('script');
    s.src = 'engine.js';
    document.body.appendChild(s);
  }

  function fail(msg) {
    document.getElementById('app').innerHTML =
      '<div style="max-width:460px;margin:40px auto;padding:24px;font-family:sans-serif;color:#A82040;line-height:1.6">'
      + '<b>Could not load lesson.</b><br>' + msg + '</div>';
  }

  function renderPicker(lessons) {
    var app = document.getElementById('app');
    var cards = lessons.map(function(l) {
      var th   = TIERS[l.tier] || TIERS.free;
      var sc   = STAGE_COLORS[l.stage] || '#2A2A2A';
      var coming = l.tier === 'soon';
      return '<button class="pk-card'+(coming?' pk-coming':'')+'" '
        + (coming ? '' : 'onclick="loadLesson(\''+l.id+'\')"') + '>'
        +'<div class="pk-emoji" style="background:'+sc+'18;border-color:'+sc+'60;box-shadow:3px 3px 0 '+sc+'40">'+l.emoji+'</div>'
        +'<div class="pk-meta">'
          +'<div class="pk-title">'+l.title_en+'</div>'
          +'<div class="pk-vi">'+l.title_vi+'</div>'
          +'<div class="pk-badges">'
            +'<span class="pk-pill" style="color:'+sc+';border-color:'+sc+'60;background:'+sc+'12">'+l.stage+' · '+l.cefr+'</span>'
            +'<span class="pk-pill" style="color:'+sc+';border-color:'+sc+'60;background:'+sc+'12">⏱ '+l.duration+'</span>'
            +'<span class="pk-pill" style="color:'+th.c+';border-color:'+th.c+'60;background:'+th.bg+'">'+
              (coming ? '🔒 Soon' : l.tier === 'premium' ? '⭐ Premium' : '🆓 Free')+'</span>'
          +'</div>'
        +'</div>'
        +'<div class="pk-arrow">'+(coming ? '🔒' : '→')+'</div>'
      +'</button>';
    }).join('');

    app.innerHTML = '<div style="height:6px;background:linear-gradient(90deg,#E84D6A,#D48A00,#1CB897,#7B5EA7)"></div>'
      +'<div class="pk-wrap su">'
        +'<div class="pk-header">'
          +'<div class="pk-logo wobble">📚</div>'
          +'<h1 class="hf" style="font-size:24px;font-weight:800;color:#2A2A2A;margin-bottom:4px">Medical English</h1>'
          +'<div style="font-size:13px;color:#AAA;font-style:italic;margin-bottom:24px">PocketBook — chọn bài để bắt đầu</div>'
        +'</div>'
        + cards
      +'</div>';
  }

  window.loadLesson = function(id) {
    document.getElementById('app').innerHTML =
      '<div style="max-width:460px;margin:60px auto;text-align:center;font-family:sans-serif;color:#AAA">'
      +'<div style="font-size:32px;margin-bottom:12px">⏳</div>'
      +'<div style="font-size:14px">Đang tải bài học…</div></div>';
    fetch('../lessons/' + id + '.json')
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data){ boot(data); })
      .catch(function(e){ fail('lessons/'+id+'.json — '+e.message); });
  };

  /* ── Boot logic ── */

  // 1) Standalone: JSON already inlined
  var inline = document.getElementById('lesson-data');
  if (inline) {
    try { boot(JSON.parse(inline.textContent)); return; }
    catch (e) { fail('Inline JSON invalid: ' + e.message); return; }
  }

  // 2) Direct link with ?lesson=id
  var params = new URLSearchParams(window.location.search);
  var id = params.get('lesson');
  if (id) {
    fetch('../lessons/' + id + '.json')
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data){ boot(data); })
      .catch(function(e){ fail('lessons/'+id+'.json — '+e.message); });
    return;
  }

  // 3) No param → show lesson picker
  fetch('../lessons/index.json')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(lessons){ renderPicker(lessons); })
    .catch(function(){ 
      // index.json not found — fallback: redirect to pb1
      loadLesson('pb1');
    });
})();
</script>
</body>
</html>
